body:
  text: 浦陽人物記卷下明宋濂撰文學篇文學之事自古及今以之自任者衆矣然當以聖人之文為宗文之立言簡竒莫如易又莫如春秋序事精嚴莫如儀禮又莫如檀弓又莫如書書之中又莫如禹貢又莫如顧命論議浩浩而不見其涯又莫如易之大傳陳情托物莫如詩詩之中反覆咏歎又莫如國風鋪張王政又莫如二雅推美盛德又莫如三頌有闔有開有變有化脈絡之流通首尾之相應莫如中庸又莫如孟子孟子之中又莫如養氣好辨等章嗚呼濂之所言者略爾以其所言推其所不言蓋可知矣人能致力於斯得之深者固與天地相始終得其淺者亦能震蕩翕張與諸子較所長於一世雖然此特論為文之體然耳若原其本則未也其本者何也天地之間至大至剛而吾藉之以生者非氣也耶必能養之而後道明道明而後氣充氣充而後文雄文雄而後追配乎聖經不若是不足謂之文也何也文之所存道之所存也文不繫道不作焉可也苟繫於道則萬世在前不謂其久吾不言焉言則與之合也萬世在後不謂其逺吾不言焉言則與之合也是故無小無大無外無內無古無今非文不足以宣非文不足以行非文不足以傳其可以無本而致之哉浦陽雖小邑自宋以來以文知名者甚衆大抵據經為本有足貴者故濓悉傳其人而僭誦所聞於其首作文學篇第四于房縣人其先自河內來遷父皓有學行尤長於文辭會五季之亂抗志不仕以布衣終後以房貴贈大理寺丞房為文有父風而精簡過之逺邇學徒咸從之遊中嘉祐四年進士第官至尚書屯田貟外郎通判應天府南京留守司兄立壁皆舉進士於鄉弟清穆去為浮屠亦以文鳴諸子世封正封亦舉進士世封能暗記六經三史正封尤以博洽自負每兄弟論辨旁引曲證各厯誦全文一字不遺人號為雙璧初世封善屬文項刻數千言縱橫變通無不如意自以為所向無敵及同正封見歐陽修修不然之世封慚修因授以為文之道世封之學於是益進晚乃著易書詩傳四十卷正封著春秋三傳是非説二十卷正封善正書酷類顔真卿世多傳之有方蒙者嘗受學世封輯其家三世能文者七人號七星集云贊曰于房論文有曰陽開陰闔俯仰變化出無入有其妙若神何其言之善也蓋文主於變變而無迹之可尋則神矣司馬遷班固韓愈之徒號為文章家其果能易此言哉宜其三世以文名也濓竊慕之厯求其文而不可多得近過左溪山見房之子正封所書碑字勢雄拔如蛟螭虎豹盤拏後先慨然想見其為人登髙遐望精神為之飛動嗚呼數百載之下能令人思之不置者必有以也夫朱臨其先家吳興五季避亂遷浦陽臨少頴悟從安定胡瑗遊瑗以明體適用之學教東南人士或治經或治事各有條法長樂劉彛授周禮又兼習水利臨乃授春秋瑗嘗著春秋辨要唯臨得之為精臨晚年好唐陸淳學淳之師啖助趙匡嘗會三傳而取舍之淳遂總其説為纂例辨疑二書臨謂孔子沒千有餘年説春秋者皆膠於偏見無有出淳書之右者雖董仲舒為兩漢通經第一然猶拘於穀梁不克别白餘可知也其所學蓋卓卓有所見如此臨初以丞相吕公著薦入官厯宣德郎守光祿寺丞以著作佐郎致仕後以子貴贈正議大夫所著春秋説二百餘萹他詩文又别有集藏於家贊曰天聖慶厯間縣之能文章者唯于房父子為盛優於經學則臨一人而已臨之所傳有淵源意其所著必有大異人者今皆亡之惜哉濂幼時尚見臨所受嘉祐告身於吳明孫家明孫蓋朱氏外孫其亡亦已久今又不知何如也斯文存亡尚往往類是豈沉酣聲利者為可恆也哉錢遹字德循縣之通化人世隱於農遹自少強敏記問過人中熙寧九年進士第調洪州推官守將王詔由樞府出威重異常他僚屬不敢仰視會有疑獄遹正色爭辨至怒罵不少奪後卒如遹議轉信州厯常真二州燕衛王宫三教授通判越州吏挾守為姦留難訟者常百數遹攝府事才二日獄為一空及後為守姦吏望風遁去除校書郎徽宗立擢殿中侍御史中丞豐稷論其回邪不可以任風憲不報稷復言必用遹則願罷臣乃改提舉湖北常平夔峽轉運判官遹興利除害發擲姦伏風采凛然人畏之如神明崇寧元年召為都官員外郎復執法殿中劾曾布援元祐姦黨擠紹聖忠賢布去遷侍御史閲兩月進中丞首乞治元符末大臣乞復孟后而廢劉后事韓忠彥曾布李清臣黃履及議者曾肇豐稷陳瓘龔夬皆坐貶遂與殿中侍御史石豫左膚言元祐皇后得罪先朝昭告宗廟天下莫不知哲宗上賔太母聽政當國大臣盡變亂紹聖之事以逞私欲因一布衣何大正狂言復還廢后位號當時物議固已洶洶乃至踈逖小臣詣闕上書忠義激切則天下公議從可知矣今朝廷既已貶削忠彥等及追禠大正誤恩則元祐皇后義非所安孔子曰必也正名乎名不正則言不順夫在先朝則曰廢后今日則謂之元祐皇后於名為不正先朝廢而陛下復於事為不順考之典禮則古昔所無稽之本朝則故實未有詢之師言則大以為不然况既為先朝所廢則宗廟祭告嵗時薦饗人事有嫌疑之迹神靈萌厭斁之心萬世之後配祔將安所施宜蚤正厥事斷以大義無牽於流俗非正之論以纍聖朝明日又言典禮所在實朝廷治亂之所係雖人主之尊不得而擅又况區區臣下敢輕變易者哉元祐皇后得罪先朝廢處瑶華制詔一頒天下無間然者矣並后匹嫡春秋譏之豈宜明盛之朝而循衰世非禮之事於是尚書右僕射京門下侍郎將中書侍郎益尚書左丞挺之右丞商英言元祐皇后再復位號考之典禮將來宗廟不可從享陵寢不可配祔揆諸禮制皆所未安請如紹聖三年九月詔旨后由是復廢豫遹遂言元符皇后名位未正乃册為崇恩太后遹章所言小臣上書者昌州推官馮澥也其書以為先帝既終則后無單立之義稽之逆順陛下無立嫂之禮要之始終皇太后亦不得伸慈婦之恩雖已遂之事難復之失然感悟追正何有不可澥由是得召對除鴻臚主簿蔡京謀取青唐遹助成其議會籍元祐黨遹以為多漏略給事中劉逵駮之左轉户部侍郎二年遷工部尚書兼侍讀三年以樞密直學士知潁昌府未行言者疏其罪黜知滁州四年徙宣州五年稍復直學士召還工部舉馮澥自代謂澥趣操端徑古人與稽嘗建眀典禮忠義凛凛薦紳歎服言者又疏其罪以待制知秀州中書舍人侯綬封還之又奪待制久之除集賢殿修撰知越州即提舉江州太平觀大觀二年會行八寶赦復修撰俄除顯謨閣待制以疾請致仕四年起為顯謨閣直學士政和三年改述古殿皆領宫祠遹家居十餘年無益之事不為惟築三大湖以利鄉民民深德之宣和二年方臘陷婺遹走蘭溪靈泉寺為盜所刺年七十二盜平州以聞有旨贈五官至太中大夫與遺表致仕恩澤賜銀絹三百匹兩遹無所不學晚尤深於厯書為文章眀白簡切自成一家學者從之多為名儒所著有遺文八十卷藏於家子楚材楚翁皆承務郎孫億年字伯壽宣和七年以祖廕入官乾道二年以右朝請大夫致仕五年落致仕除利州路提點刑獄不果上淳熙十一年轉朝議大夫卒有詩號雲巢集云贊曰四朝史有云瑶華失位而復也太母實詔之姑有還婦之文母有改子之道播之天下合於至公誠哉是言也遹在當時孰謂其不知此理耶其意蓋有所循焉爾執禮銘遹之墓嘆其剛方少圓死生負謗其厚於揚善者哉何敏中字元功世家太末其逺祖延夀始來遷浦陽敏中自少學易恐飲酒廢事終其身弗御與梅執禮交甚洽每有疑難相與論定之郡縣察其賢將以八行為遺逸薦辭敏中素仁厚遊太學時同舍生方立卒敏中鬻行槖持其喪歸鄰州冦起將壓境敏中攜家避山中比鄰從者以百數道遇擁刃來者衆相顧泣且死敏中出告其酋酋大呼曰此浦江何公也吾昔為尉所縳藉公一言而免是嘗有恩於我者不可害不可害即命兵護出之朱有聞字子益縣人幼孤長能刻苦為學夏不避蚊冬不擁爐久之悉通諸家書作文尚質實有理致好飲酒視富貴無所屈縣令丞而下欲見之不能得同郡吕祖謙名重一時知其有守而多聞訪之逆旅中再以書速之止修報謝亦竟不行祖謙愈重焉淳熙十六年卒年六十五子羣字穎叔遊太學有聲中紹熙四年進士第贊曰揚雄有言曰君子純終領聞蠢迪撿押如敏中有聞二人是已議者以立傳之法必關大勸懲則書若二人者陸陸爾庸庸爾何必纍簡編哉濂曰不然世之人掊克自恣剝膚及髓苟臨患難人將甘心焉如盜感敏中之恩庇百人而不殺者有之乎奔走州邑奴事上官望塵亟拜掃門求通唯恐不能一見如縣令丞欲謁有聞而不可得者又有之乎時非三代人有小善必取曽謂二人之行而可遺之乎激而書之知者當識之也倪朴字文卿唐户部侍郎若水之後也若水居恆州唐末之亂子孫南遷江浙間五代時有名盈者又自吳興遷浦陽之石陵世為農至朴曽祖展始以資雄於鄉初衢婺嘗輸丁身錢相傳仁宗時永康胡則為奏免崇寧間欲復算之適部使者行郡展持則像拜使者于馬前厯訴其非便使者上其事復獲免祖子從性好施田旱及半悉捐與種家然又多奇謀建炎初山賊作亂逺近震動縣令丞揖子從問計子從為之籌畫使其子統民兵為前導賊皆敗走民兵别部有貪功擒至百餘人者縣令例縛之將斬以徇子從聞之急白令曰此輩豈皆賊哉不如勿殺使自新賊不足定也令悟頓足曰微公言幾敗吾事悉縱之事果帖帖朴豪雋不羈喜舞劍談兵棄其無用之學必欲見之於事功紹興間聞廟堂謀遣將掃清河洛喜曰依日月乘風雲以佐天誅此其時矣乃草書數千言厯陳征討大計精忠感激有古作者風鄭伯熊見之連吐舌曰男子男子雖以無階不得上進而朴志益堅且以天下山川險阻戶口多寡用兵者所當知乃遍考群書成輿地會元志四十卷又合古今夷夏繪為一圖張之屋壁手指心計何地可戰何城可守猶幸一用其能晚雖知不用復著鑑轍録五卷以痛國家禦侮用䇿之失惓惓猶前志也朴好使氣與人多不合年四十七尚未娶當時人亦鮮有知朴者獨永康陳亮敬焉淳熙中與知縣趙汝鉞有隙鄉人樓益恭遂以豪俠中之徙家筠州會赦東歸朴於書過眼不再覽辨駮甚精嘗言吳越受梁封爵未嘗稱帝其改元寶大實當梁亡之後且取觀音院鐘刻為證以破五代史之疑論者服之朴之友吳克己字復之縣之鶴塘人窮經博古尤邃於易旁通釋氏書多有著述朴嘗評其文汪洋恢怪如崩崖翻浪使人畏且驚又玩之而不忍去竟不知為何等語蓋克己多談內典故朴頗譏之贊曰宋自宣和之後國勢不振金人乘釁長驅而入破陷太原侵軼真定攻搗汴京以致天子蒙塵生民暴骨當時臣僚謂宜枕戈待旦不共戴天以洗刷國恥以剋復土疆乃復割地議和頓首請命忠義之士雖欲有為每擯斥不用卒致淪亡而莫之救哀哉朴以一布衣之微非有爵號之榮祿賜之厚乃能赤心憂國吐其耿耿直欲叩帝閽上之雖其書不能進其視賈廷佐之二疏陳亮之三書俊快朗烈照耀後先如朴者豈非人傑也哉使朝廷用之未必不能立竒勳奈何姦惡秉軸有志之士不獲泄其忠憤之氣推是言之亦不獨人謀之不臧也嗚呼王業終至偏安父讎終至不報必當有任是責者幸朴書猶存百世之下非惟使英雄灑淚肉食者聞之亦或知勸哉方鳳一名景山字韶父其先出唐玄英處士干干曾孫傅字輔卿始自睦來遷浦陽仙華山傅生招招生文遇文遇生資字逢原中嘉祐八年進士第厯官知真州未上卒贈金紫光祿大夫資生揚逺字遐舉疏雋慷慨以文章震耀一時亦中元祐三年進士第以吏部侍郎出為河北轉運使有能名上屢降詔寵諭之歿贈太中大夫揚逺至鳳凡七世鳳有異材常出遊杭都盡交海內知名士將作監丞方洪竒其文以族子任試國子監舉上禮部不中第主閣門舍人王斌家教其二子大小登斌與丞相陳宜中為親晜弟鳳因得見宜中三以䇿告宜中雖不能聽將奏補為初品官既而宜中走海南事遂寢後以特恩授容州文學未幾宋亡鳳自是無仕志益肆為汗漫遊北出金陵京口南過東甌海上類皆悼天塹不守翠華無從顧盻徘徊老淚如霰一日復遊杭有人自海上來見鳳伏地泣起相抱持鳳問故則曰豫大登也自從陳丞相乞師南海不得還遂為暹國臣暹蓋古者文單盤越屬國泛大海至泉南始達岸今為其奉使上國重過丞相故府無一人一馬可識不意復得見先生也言訖泣下鳳亦泣因欲俱行人勸止之鳳善詩通毛鄭二家言晚遂一發於咏歌音調淒涼深於古今之感臨沒猶屬其子樗題其旌曰容州示不忘也宋季文弊鳳頗厭之嘗謂學者曰文章必真實中正方可傳他則腐爛漫漶當與東華塵土俱盡已而言果驗性不喜佛老讀唐傅奕傳壯其為人自托奕後闢異教者數十事以擬髙識篇題之曰正人心書尚未完他所著詩三千餘篇曰存雅堂稿樗字夀父亦精於詩無愧於鳳云贊曰世言杜甫一飯不忘君今考其詩信然鳳雖至老但語及勝國事必仰視霄漢凄然泣下故其詩亦危苦悲傷其殆有得於甫者非耶鳳嘗與閩人謝翶括人吳思齊為友思齊則陳亮外曽孫翶則文天祥客也皆工詩皆客浦陽浦陽之詩為之一變思齊以父任入官為嘉興丞宋亡麻衣繩屨退隱深山中翶雖布衣尤忠憤鬱鬱或披髮徉狂行嘯於野或登釣臺慟哭以酹天祥酹已復作楚歌以招其魂皆可謂氣節不羣之士而獨與鳳善豈易所謂同聲相應者耶黃景昌字清逺一字明逺縣之靈泉人其先與太史公庭堅同所自出四歲入小學十二歲能屬文長從方鳳吳思齊謝翶遊益通五經諸子詩賦百家之言尤篤意書春秋學之四十年不倦三傳異説學者不知所從景昌據經為斷各采其長有不合者痛辭闢之不少恕作春秋舉傳論巴川陽恪著夏時考正言三代悉用夏時不改月數景昌以左氏縱不與孔子同時亦當近在孔子後其言當不誣作周正如傳考建安蔡沉集衆説為書傳世無敢議其非景昌獨疏其倍師説者數十百條作蔡氏傳正誤古今詩體製雖相襲而音節則殊近代以此名家者亦罕知其説景昌以古人論詩主於聲今人論詩主於辭聲則動合律吕可以被之金石管絃辭則文而已矣乃集漢魏以來諸詩各論其時代而甄别之作古詩考景昌善持論出入經史衮衮不窮如議法之吏反覆推鞫其人辭不服不止故其所言皆綽有理致他著述尚多不能備陳景昌年既耄猶執筆刪述不已或勸其休景昌曰吾豈不知老之宜佚哉恐一旦即死無以藉手見古人耳晚自號田居子述田間古調辭九章賔客至輒揭甕取酒共飲酒酣取辭歌之以策擊几為節音韻激烈聞者自失不知世上有貴富也景昌事親孝親沒哀泣至終喪遇孤姊甚戀戀懷鄉人有恩重紀至元二年卒年七十六贊曰縣之立言之士名不著者三人宋元祐紹聖間有朱恮者師黃山薛大觀大觀得平陽孫復春秋之學恮悉傳之嘗著春秋群疑辨若干卷宋季有蔡慶宋光逺者以春秋舉於鄉後以恩補官至武進丞亦著春秋集解若干卷有陳訥升之者通周易得先儒未發之祕亦著河圖易象本義八卷今皆散佚無存或僅存人亦鮮知之者竊意事功之實行難亡語言之空文易泯故致是爾然則世之傳者亦何往而非空文哉必繫其學之醇疵醇則習之者多疵則傳之者少也嗚呼信如是説古之荒誕不經之文縱橫捭闔之術可謂極疵矣至今熟在人口者又何其多耶是蓋有不可曉者意亦有幸不幸存焉幸不幸天也天則非人之所知矣雖然人衆者勝天文之得傳與否實繫乎後之人天何預哉今觀景昌所著之書亦將散佚無存矣濂為此懼故得而備論之栁貫字道傳其先居河東宋建炎中七世祖鑄始從趙鼎自解遷杭鑄子森又自杭遷浦陽烏蜀山父金字時聲擢咸淳三年右科進士第為髙郵令宋季城竇山民倡亂火金所居官同金捕斬之金惻然曰此豈其本心哉第為飢寒所驅爾乃白戮其魁餘悉縱不問衆感金造室廬還之道傳幼有異質頴悟過人受經於蘭溪金履祥學文於方鳳吳思齊謝翶自經史百氏兵刑律厯數術方技異教外書靡所不通作為文章涵肆演迤舂容紆餘人多傳誦之大德四年道傳年三十一始用察舉為江山縣學教諭遷昌國州學正轉湖廣等處儒學副提舉未上延祐六年改國子助教升博士前後在弟子列者千餘人業成而仕後多知名擢太常博士時方承平稽古禮文之事次第並舉遇有所設施必俟道傳論定柄國大臣欲以其祖配食孔子廟衆莫敢忤道傳毅然却之有神降於洺長吏列上禮部乞加封號道傳謂神姦鼓民不治將亂宜下所部禁之禮部如其言沅州貢包茅茅輕舟易溺道傳請附他貢物以輸監察御史馬祖常薦其材可任風憲章再上不報泰定三年出提舉江西等處儒學新龍興郡庠復東湖書院侵田聘名儒為學者師士風大振他書院未籍於官者亡慮數十舊設主領以司出內多行貨求檄至則乾沒為姦道傳禁勿設分𨽻學官吏循舊比以例卷進歲為米八十石道傳斥去之南康倉吏坐飛糧株連逮繫者百餘人省憲二府檄道傳訊其獄鈎擲隱伏所平反甚衆至正元年召為翰林待制兼國史院編修官到官僅七閲月以疾卒年七十三館閣之士多至灑泣者道傳局度凝定燕居默坐端嚴若神即之如入春風中久與之處未嘗見疾言遽色雖有桀驁者瞻其德容莫不氣奪而意消孝友本乎天性弟實出為人後遇之有恩不翅在家者生平以奬進人材為巳任人有一善諄諄稱舉唯恐不聞天歷以來與崇仁虞集豐城揭徯斯義烏黃溍齊名天下人髙之號之曰四先生善楷法工篆籕妙處不讓李陽氷兼能鑒定古彛器書畫而别其真贋所著書有文集二十卷别集二十卷字系二卷近思録廣輯三卷金石竹帛遺文若干卷子卣同因孫頴穆頴以廕入官調永豐尉贊曰浦江壤地雖不越一百里仙華山拔地而起竒形佹觀如旌旗如寶蓮華如鐵馬臨關而大江之水又如白虹蜿蜒斜絡乎其前實天地間秀絶之地也故人生其中多以文學知名雖去家他縣者子孫亦以文顯如黃侍講晉卿其先亦縣人至名琳者始遷烏傷琳之先墓今猶在仙華山南豈堪輿家風氣之説實有所憑耶抑適然也吳萊字立夫年四歲其母盛氏口授孝經論語及穀梁傳隨能成誦七歲能賦詩族父幼敏家素多書立夫每私取讀之幼敏從傍竊窺乃班固漢書也乃指谷永杜鄴傳謂曰汝竊觀吾家書能誦此當貸汝罰立夫琅然誦之至終篇不遺一字幼敏以為偶熟此第三易他編皆如初因盡出所有書使讀之方鳳時寓幼敏家見而嘆曰明敏如吳菜雖汝南應世叔不是過也悉以其學授焉立夫自是該貫古今無所不考年未冠撰論倭千七百言論議俊爽識者謂有秦漢風延祐七年立夫年二十四以春秋舉上禮部尋以所言不合於有司退歸松山中益窮諸經之説用功既深所造愈精間有論著絶出於庸常數等翻閲子書百餘家辨其正邪駮其偽真援據皆的切可傳四方學者一時多師之重紀至元三年監察御史許紹祖以茂材薦調長薌書院山長未上卒年四十四初立夫好遊嘗東出齊魯北抵燕趙每遇中原奇絶處及昔人歌舞戰鬬之地輒慷慨髙歌呼酒自慰頗謂有司馬子長遺風及還江南復遊海東洲厯蛟門峽過小白華山登盤陀石見曉日初出海波盡紅瞪然長視思欲起安期羡門而與之遊由是襟懷益踈朗文章益雄宕有奇氣嘗謂人曰胸中無三萬卷書眼中無天下竒山川未必能文縱能亦兒女語耳立夫精識絶倫自秦漢至於近代但舉隻簡片削必能别其為何代人所作或怪而問之立夫曰辭氣音調世有不同人自不深察耳工詩賦尤善論文嘗言作文如用兵兵法有正有竒正是法度要部伍分明竒是不為法度所縛舉眼之頃千變萬化坐作進退擊刺一時俱起及其欲止什自歸什伍自歸伍元不曾亂聞者服之晚自號曰深􅒁山道人人因稱之曰深􅒁先生所著書有尚書標説六卷春秋世變圖二卷春秋傳授譜一卷古職方録八卷孟子弟子列傳二卷楚漢正聲二卷樂府類編若干卷唐律刪要若干卷詩文六十卷他如詩傳科條春秋經説胡氏傳考誤未完子士諤士謐士諤金華縣學教諭贊曰濓嘗受學於立夫問其作文之法則謂有篇聫欲其脈絡貫通有假聫欲其竒耦迭生有句聨欲其長短合節有字聨欲其賔主對待又問其作賦之法則謂有音法欲其倡和闔闢有韻法欲其清濁諧協有辭法欲其呼吸相應有章法欲其布置謹嚴總而言之皆不越生承還三者而已然而字有不齊體亦不一須必隨其類而附之不使玉瓉與瓦缶並陳斯為得之此又在乎三者之外而非精擇不能到也顧言猶在耳而恨學之未能因志諸傳末以謹其傳焉貞節篇詩曰無非無儀惟酒食是議釋之者曰有非非婦人也有善亦非婦人也唯議夫酒食而已蓋婦人之行不出閨門在無事之時尚不欲以善自聞况當哀苦之餘稱之曰未亡人而顧以是自衒歟君子之論每欲先之而不敢後者豈非憫其志之確而不少變歟抑將假是以勵其不能者歟世之材士大夫習爼豆攻詩書坐而堯言行而舜趨其自負誠不在古人後一旦受人家國之寄輒懷二心者有之矣况區區一女子所事不過織紝中饋之間反能守死自誓如秋霜烈日不可狎玩又可得而少之歟是故楚之貞姬梁之髙行漢之桓嫠皆登於彤管之書者殆以是歟雖然貞節之昭風俗之偷也使當比屋可封之時果孰名其為貞婦貞婦之得名蓋以世之不貞者衆也濓又豈得不為衰俗一慨也歟浦陽舊志無及貞節之事者濂今得二人焉作貞節篇第五何道融字處和紹興諸暨人善讀書鼓琴年十九歸縣人凌楠歸一年而楠亡遺腹産一子曰堅道融誓不再適唯晝夜教堅以學俾從陳亮遊及堅能與薦書以姓名自見於諸君子間喜曰吾之不死待汝者欲持以見汝父於地下耳汝益勉之堅後以學聞紹熙元年卒年五十一倪宜弟縣之興賢人年二十為同里戴銘妻三十而銘亡生二子泳洽甚幼銘家故貧宜弟上無所依下無所托米鹽日以不給乃飲泣就絲枲夜分燈屢涸猶煢煢在機杼間厯三十年始能葬舅姑父母及夫之喪教其子成人又二十一年乃終至治中部使者行縣鄉老白宜弟之行當得旌門閭使者命縣上其事會有沮之者不行贊曰婦人以貞節名謂之不幸而尚欲邀旌寵乎旌寵朝廷事也浦陽人物記卷下
