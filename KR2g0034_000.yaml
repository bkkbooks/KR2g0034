front:
  text: 欽定四庫全書史部七
  hash: sha256:1b6640596a5064ea3fb39af388ca6b846d3ddcc674207e8493e72e4c4059763a
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2g0034_WYG_000-1a, image: WYG0452/WYG0452-0001a.png}
body:
  text: 浦陽人物記目録傳記類三總録之屬卷上忠義梅溶梅執禮孝友陳太竭何千齡鍾宅鄭綺政事楊琁張敦蔣邵傅柔傅雱黃仁環吳傳石範王萬吳直方趙大訥卷下文學于房朱臨錢遹何敏中朱有聞倪朴方鳯黃景昌栁貫吳萊貞節凌楠妻何道融戴銘妻倪宜弟臣等謹案浦陽人物記二卷明宋濓撰濓字景濓浦江人元末用薦除翰林編修以親老辭明初徵授太子經厯官翰林學士承旨事迹具明史本傳是書凡分五目曰忠義曰孝友曰政事曰文學曰貞節所紀共二十有九人而以進士題名一篇附於後歐陽玄為作序稱其至公甚當不以私意為豫奪蓋濂本以文章名世故所作皆具有史法其書本成於元時後人編輯濓集者止採録其論贊而全書則仍别行蓋用羅願鄂州小集收新安志諸小序而不收其志例也此本為明𢎞治中厯陽王珍所重刻卷末有濓一跋稱始立稿而廉侯景淵遽取刋布故抵牾者多今補定五十餘處視舊行為小勝末題至正十三年此跋濓集亦未收蓋晚年改正之本編録時偶佚矣乾隆四十三年六月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀浦陽人物記原序古者以公侯伯子男五等之爵分建邦國於天下由其國有小大故其制度文章亦有隆殺不相沿襲唯史氏之官則皆得置之而史氏之所職掌凡時事之當否人材之善惡田賦之多寡朝聘之往來又皆得書之其名見於書傳者則晉之乘楚之檮杌魯之春秋是也自封建廢而為郡縣不復各有其官於是舉天下之大四海之衆其事悉萃於一史氏使書之雖罄渭川之竹以為簡竭徂徠之松以為煤焉能保其無闕逸乎後之君子有以知其然復各以所聞見於論述若廬陵豫章之紀烈士襄陽東萊錦里之載耆舊魯國會稽汝南濟北零陵武昌之傳先賢他如幽州古今人物志南陽先民傳閩川名士録陳留人物記等書凡九十餘家至今與史氏之文並傳蓋非但欲補其遺亡而於天衷民性之發亦有不容自已者矣浦陽為婺屬邑異時人物彬彬輩出陳孝子以卓行聞梅節愍以忠義顯王忠惠以政事著倪石陵以文學稱與夫制行衡門流聲天闕其事可紀者尚多考之信史或載與否金華宋景濓有感於斯亦以所聞述浦陽人物記二卷上而忠君事親治政講學下暨女婦之節可以為世鑒者悉按其實而列著之不以一毫喜愠之私而為豫奪何其至公而甚當也噫立言之法惟其公而已惟其公也非惟不因喜愠論人亦不以窮逹觀人但察其賢否為何如耳茍或不然則雖入帷幄歷臺府贊樞機典藩翰曾不若匹夫之所行者固不少世之文士好揚富貴而沒賤貧是果何道哉景濓斯記惟有關治教者則書不問乎其他此其學術之正才識之髙豈易及耶豫甚敬畏之因志其所見於篇首景濓為文序事極有法議論則開闔精神氣昌不少餒復深惜其沈困在下而未能遇也翰林學士承旨榮祿大夫知制誥兼修國史歐陽玄序凡例一楊琁傳照後漢書修錢遹梅執禮鄭綺王萬傳照宋史修其餘諸傳或采洪遵郡志或考朱子槐縣經或按朱紱東軒日抄毛洪筆録蔣思先逹遺事記謝翺浦汭先民傳更各參之行狀墓碑譜圖記序諸文事迹皆有所據一字不敢妄為登載其舊傳或有舛繆者則無如之何姑俟博聞者正之一忠義孝友人之大節故以為先而政事次之文學又次之貞節又次之犬槩所書各取其長或應入而不入者亦頗示微意焉一古人於傳記中多書名非特以其尚質蓋亦為文之體當然爾子孫之於祖考有稱名者則司馬遷自序謂昌生毋懌毋懌生喜喜生談班固敘傳謂回生况况生三子伯斿稚稚生彪是也弟子之於師有稱名者則子路答長沮之問曰為孔丘是也後人之於先聖先師亦有稱名者則韓愈石鼓歌曰柄任儒術崇丘軻是也此類甚多不能枚舉蓋古者生無爵死無諡雖祖考亦名之况其他乎所謂避諱但不敢面呼之耳著文欲紀事行逺未必屑屑為之諱也後世彌文日盛往往不能行尊慕之實徒於名號謬為恭敬淳祐以降不惟諱其名又諱其字或以號舉或以齋名稱其見之文字間在當時固有知之者稍歷一二世則不識為何人矣深可一慨濓今一依史氏之例皆以名書唯於所嘗師事者倣孟子之稱仲尼程伯淳之稱周茂叔以字書之蓋變例也一祖父書名而子孫或書字蓋倣司馬遷伍子胥傳例一知其所自出者則書曰自某郡來遷浦陽不知者及己見者則書曰縣人至於居在何鄉卒在何年夀年多少可考者亦書一舊有名無字者因之不知其事之詳而姓名不可闕者附諸傳中一本傳所載有與墓銘不同者而墓銘又有與行狀不同者歷官次第行事後先多紊亂難考今擇其理優者載之一贊文之設非欲專如史氏作品評蓋以事有所疑與當知者不言則不可欲雜陳傳中又恐於文體有礙故藉是以發之耳一梅溶六傳而絶執禮四傳而絶傅雱之後居清江王萬之後居常熟若此之類既各載譜圖兹不書唯子若孫可以附麗者著之
