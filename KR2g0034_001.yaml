body:
  text: 浦陽人物記卷上明宋濓撰忠義篇濓嘗讀隋書見史臣所載張季珣事謂季珣家素忠烈兄弟俱死國難未嘗不竊歎其難也蓋自古忠臣能殺身以徇義者何代無之求其一門而再見者曷其少哉將父兄子弟之所志有不同耶抑一死為不易非大勇者不能全其節也當宋宣和初睦州方臘反攻破六州五十二縣棄官守委城邑望風而遁者往往皆是梅溶以單州助教攝松陽丞乃能挺身捍禦就死弗悔靖康末金人大舉入侵京城失守輔翼大臣反面事讎至有拔劍殺攀輅之人而逼上如青城者溶之從子執禮不勝其憤復團結軍民十餘萬謀奪萬勝門夜搗敵營以二帝歸謀泄被害自宣和至靖康七年之間而梅氏一門殺身徇義者凡二人豈非難哉豈非難哉較之季珣家其忠烈未必少減之也夫生者人之所甚樂而有家之私又人之不能遽忘彼豈甘於頸血濺地而自以為得計哉第以君上決不可背名教決不可負綱常決不可虧忠義一激雖泰山之髙不見其形雷霆之鳴不聞其聲刀鋸在前不覺其利鼎鑊在後不知其酷必欲得死然後為安也今去之雖數百載忠剛之氣充塞乎天地之間凛然如生非烈丈夫能如是乎使當時縱能屈膝受辱以保其首領受人唾罵受人賤惡雖生百年又何益也賈誼有言曰守圉捍敵之臣誠死城郭封疆梅溶以之法度之臣誠死社稷執禮以之濓生也後慕其氣節欲為之執鞭而不可得輒書其事可以勸不忠者作忠義篇第一梅溶其先吳興人五代時有諱聳者始避地來遷浦陽寖成大族在通化者為尤蕃溶以儒受薦為單州助教年七十餘攝松陽丞宣和二年冬盜發青溪據歙睦遂破杭明年春婺衢處相繼陷兵及境溶勢不能敵死之從子執禮言於朝官其二子敦時敦成敦時後為遂安令執禮字和勝家故貧幼又喪父其母胡氏教以讀書中崇寧五年進士第調常山尉未赴以薦為詳定三司勑令刪定官俄遷九域志編修官秩滿除武學博士或謂執禮文儒不宜處以武事執禮欣然就職陳説大義間親挾弧矢為諸生率大司成強淵明賢之數為宰相言相以未嘗識面為慊執禮聞之曰以人言而得必以人言而失吾求在我而已卒不往謁轉重修政和勑令刪定官擢軍器監丞以親嫌辭改鴻臚遷比部員外郎比部職勾稽財貨文牘山委率不暇經目苑吏有持茶劵至為錢三百萬者以楊戬矯旨迫取甚急執禮一閲知其妄欲白之長二疑不敢乃獨列上果詐也改度支吏部進國子司業兼資善堂翊善歷左右二司員外郎召試中書舍人移給事中林攄以前執政赴闕宿留冀復用臺諫顧望莫敢言執禮論去之孟昌齡居鄆質人室廬嘗贖不肯與而請中旨奪之外郡卒留役都中者萬數肆不逞為姦詔悉令還楊戬占不遣內侍張佑董葺太廟僣求賞皆駮奏不行拜禮部侍郎素與王黼善黼嘗置酒其第夸示園觀女樂之盛有驕色執禮曰公為宰相當與天下同憂樂今方臘流毒吳地瘡痏未平豈歌舞宴樂時耶退又以詩戒之黼愧怒執禮上疏求去有不能薦進人材之語黼曰是欲為宰相耶會孟享原廟後至以顯謨閣待制知蘄州又奪職明年徙知滁州復集英殿修撰西洛歲供縣官炭自元豐以來稱林木且盡令淮南代輸執禮曰滁之林木亦盡矣經四十年久洛都當已復舊即奏免之賦鹽有定數而間者抑配以補故額執禮曰郡不能當蘇杭一邑而食鹽倍於粟數民何以堪請於朝詔損二十萬滁人德之皆繪像祠焉欽宗立徙知鎮江府召為翰林學士未上改吏部尚書旋改户部方軍興調度不足執禮請以禁內錢𨽻有司凡六宫廪給皆由度支乃得下嘗有小黃門持中批詣部取錢而御封不用璽者既悟其失復取之執禮奏審詔責典寶夫人而杖黃門由是人不敢妄取月省浮費三十萬金人抵闕執禮勸帝親征而請太上帝后皇后太子皆出避用事者沮之洎失守金人質帝於營邀金繒以數百千萬計曰和議已定所需滿數則奉天子還闕執禮與同列陳知質程振安扶皆主根索四人哀民力已囷相與謀曰金人所欲無藝極雖銅鐵亦不能給盍以軍法結罪儻窒其求宦者挾宿怨語金帥曰城中七百萬户所取未百一但許民持金銀易粟麥當有應者已而果然帥怒呼四人責之答曰天子蒙塵臣民皆願致死雖肝腦不計於金繒何有哉顧以比屋枵空無以塞命耳帥問官長何在振恐執禮獲罪遽前曰皆官長也帥益怒先取其副胡舜陟胡唐老姚舜明王俁各杖之百執禮等猶為之請俄遣還將及門呼下馬撾殺之而梟其首時靖康二年二月也是日天宇晝冥士庶皆霣涕憤歎初二帝再出執禮力爭不從遂大慟歸見其母曰主辱臣死何以生為母曰忠孝難兩全汝受國厚恩如此宜刳心上報慎勿以老人為念執禮乃以其母屬兄弟去與諸將謀奪萬勝門夜搗敵營以二帝歸范瓊輩皆謂無益獨吳革從公議以振給為名與宗室子昉密團結軍民不旬日得十餘萬王時雍徐秉哲聞之使瓊泄其謀故陽託根索事殺之秉哲即捕子昉送營中革欲以一隊自奮瓊紿至帳下議事遂斬革執禮通諸經尤深於周易所著有文集十五卷死時年四十九髙宗即位詔贈通奉大夫端明殿學士議者以為薄復加資政殿學士諡曰節愍子忠恕承務郎監潭州南嶽廟忠範承務郎贊曰溶之死執禮嘗哭之曰吾從父一老儒生耳平日恂恂似不能言者乃能慨然守百里之地以蕞爾之軀膺虎狼之暴至於糜身弗顧執禮之言其真足信哉凡人外柔者內未必柔但視其所存為何如耳世槩以白面書生目之可乎哉可乎哉執禮之事尤光明俊偉是蓋無忝於溶者使狗鼠小臣不泄其謀則二帝未必北巡髙宗未必南渡悠悠蒼天此何人哉悲夫孝友篇浦陽自唐天寶末置縣以來凡歷七代更五百餘年而生齒之繁至一十二萬有竒歲月如是之久民人如是之衆中間豈無豪傑者興效長才出祕計以自赴於功名之會者哉又豈無握長鎗大劔陷陳攻城以苟徼貴富者哉計其當時雄視一方勇蓋三軍自謂可以流芳於無窮曾未百年聲消響絶雖其子孫亦有不能道其名若字者矣嗚呼是果何為者哉若夫閭巷布衣之家雖其所為不足以驚世動俗有能修孝友之道者朝廷必下詔以旌之史官必求其實而書之脫或史官失書賢士大夫又必從而謹志之則其事往往反足以傳於後世豈非天經地義不可磨滅有非區區功名貴富者所可同也哉善乎魏徴之言曰雖或位登台輔爵列王侯祿積萬鍾馬踰千駟死之日曾不得與斯人之徒𨽻齒其言又豈不信然也哉嗚呼有志之士寧不於是重有感哉濓雖不敏未嘗不感激思奮因考舊書及諸儒之所記録以孝友著者得四人焉衰麻終身哀哭不輟上通神明可感異類曰陳太竭四代聚居穆穆雍雍門旌偉然映照閭井曰何千齡剔肝療母化感一門雖非中道亦出至性曰鍾宅惇禮行義世濟厥美延於九葉聲聞益著曰鄭綺作孝友篇第二陳太竭縣人武鼎之子親併亡即墓手藝松柏終身衰麻形質枯瘁哀哭弗輟每奠果肴烏鳥不啄何千齡縣人四世同居梁貞明六年表旌門閭鍾宅縣之興賢人淳熙中母病宅剔肝和藥以進病尋愈從子明亦刲股療母及明有疾明弟滿又刲股療明皆瘳知縣李知退義其事為代輸稅賦三年宅家嘗三世同居宅之子文厚文廣尤極友愛文廣妻求分文廣恐傷兄之心即出之宅有至行其事親出於天性而非矯揉所致當時有金智深者母得危疾亦剔肝為餌方安議者謂宅化之贊曰太竭衰麻終身雖過乎禮其純孝有足稱焉千齡當唐季人倫廢壞之時孝行推於友睦而禮遜之風數世不衰真所謂豪傑之士矣鍾宅一家剔肝刲股者三人亦皆出於迫切之誠或舉韓愈氏所論鄠人者非之非之誠是也較於親病不嘗藥者豈不有間歟書而列之非嘉宅也鄭綺字宗文白麟二十一世孫也其先居滎陽凝道遷歙自牖遷睦淮遷浦陽今為浦陽感德人淮綺之祖也綺通春秋榖梁學撰合經論數萬言事父母孝父照以非罪繫獄當入死綺上疏郡守錢端禮請以身代端禮察之白其誣母張病風攣綺保持若嬰兒但適厠必抱就之三十年不懈綺生聞聞生運運生政政生德圭德璋至元中仇家傾德璋以死罪將械送揚州德圭毅然代其行德璋泣隨之爭欲赴吏德圭竟以詭計先死之德圭生文嗣自綺至文嗣凡同居六世歷二百年咸如綺在時至大二年秋九月鄉老黃汝霖等言於縣縣上其事亷訪使加審按焉文逹中書禮部四年春二月準式旌表門閭文嗣生鑑鑑生渭渭生梴皆善守合數千指無異心者重紀至元元年冬十二月太常博士栁貫與鄉校羣士又上狀請如故事復其家從之初文嗣既沒德璋子太和司家事嚴而有恩雖家庭中凛如公府子弟小有過頒白者猶鞭之每遇歲時太和坐堂上羣從子皆盛衣冠鴈行立左序下以次進拜跪奉觴上壽畢皆肅容拱手自右趨出足武相銜無敢參差者見者唶唶嗟嘆謂有三代遺風雖石奮家亦有所不及名聞天下自大丞相及臺院名公卿多賦詩美其行部使者行縣以其孝友七郡或莫之先復書浙東第一家以褒寵之太和喜學禮不奉老子浮屠經像冠昏喪祭必稽古乃行子孫從化馴行孝謹不識㕓市嬉戲事執親喪哀戚甚三年不御酒肉食貨田賦之屬各有所司無敢私凡出納雖絲毫事咸有文可覆挾日則會不公則監視發之諸子晝趨功入夜輒聚坐一室溫溫語笑至更餘始休雖多列顯仕不敢挾此有一毫自驕意諸婦惟事女紅不使預家政宗族里閭以恩懷之各有差內外極嚴輿臺通傳不敢越堂限家畜兩馬一出則一為之不食人以為行義所感有家範二卷傳於世贊曰史氏之言多有不足取信者濓少時嘗讀唐書世系表謂鄭白麟之後不傳私竊信之及觀司空圖滎陽記則曰白麟生師慎師慎生懷芬懷芬生鄑鄑生斌卿斌卿生唐青州刺史庶庶生侍中徽徽生大理卿鄘鄘生鱐鱐生給事中謨謨生宣州觀察使回又觀鄭燮生遂安譜則曰回生𢎞𢎞生垣垣生倕倕生子襲子襲生扈扈生宋歙縣令凝道凝道生殿中侍御史自牖自牖生祕閣校理安仁安仁生淮淮生照照生綺綺即傳之所書者也其承傳次第灼灼可信如此惡覩其所謂不傳者哉考徴不廣而欲以一人之見聞定百載之是非難矣政事篇嗚呼紀載之文其可少乎使數百年之間赫赫焉若前日事者非記之於文乎其有政事可書而不書遂至泯泯無聞者又非當時執筆者之過乎濓嘗從薦紳先生遊頗知浦陽事聞五代時其人多仕吳越錢氏有劉英黃子先者或為其國尚書或為其國統軍使錢氏納土之後又多仕於宋嘉祐元祐之間方資及其子揚逺連中進士第揚逺之事語在方鳯傳揚逺之子鑄字世範通判秀州贈奉直大夫鑄之子洙字宗魯歷知梅新二州洙之族子果字叔毅中龍興元年進士第通判臨安府果之弟梁字叔材亦舉進士不第以恩補官為山陽尉趙不玷自睦來遷之後孫曾以文科奮者八人或為令丞或為簿若尉其名皆班班見於登科記中他如鄭端禮之知英德府吳大同之為清逺軍節度推官則又在所不論凡此十餘人豈無以治能名者閲世未久雖或僅知其名氏而已不聞其行業之詳可勝歎哉其知名氏者尚若是則其所不知者從可知矣自五代以來且若是則夫五代之前又可知已嗚呼政事於人大矣操厚倫惇俗之具執舒陽慘陰之柄御賞善罰惡之權任出生入死之寄其在朝廷則四海被其澤其在一郡則一郡仰其賜其在一縣則一縣受其福茍得其人則上明下淳歌謡太平一或反是則流毒四境神怒民怨至有激成他變者其所繫甚重且難也蓋如此人能以一善自效于官者豈可使之泯泯無聞乎縱曰往者之不可作寧不使來者之知勸乎嗚呼紀載之文其可少乎濓竊拳拳於此不可知者固已無如之何幸猶可以考見者輒不敢不書自楊琁至趙大訥凡十一人雖官有崇卑治有優劣其利吾民一也因盡録之作政事篇第三楊琁字機平髙祖父茂本河東人從光武征伐為威冦將軍封烏傷新陽鄉侯建武中就國傳封三世有罪國除因而家焉父扶字聖儀為武源令遷交趾刺史有理能名兄喬為尚書容儀偉麗數上言政事桓帝愛其才貌詔妻以公主喬固辭不聽遂閉口不食七日而死琁初舉孝亷靈帝時為零陵太守是時蒼梧桂陽猾賊相聚攻郡縣賊衆多而琁力弱吏人憂恐琁乃特制馬車數十乘以排去聲囊盛石灰於車上繫布索於馬尾又為兵車專彀弓弩尅期會戰乃令馬車居前順風鼓灰賊不得視因以火燒布然馬驚奔突賊陳因使後車弓弩亂發鉦鼓鳴震羣盜波駭破散追逐傷斬無數梟其渠帥郡境以清荆州刺史趙凱誣奏琁實非身破賊而妄有其功琁與相章奏凱有黨助遂檻車徴琁防禁嚴密無由自訟乃噬臂出血書衣為章具陳破賊形勢又言凱所誣狀潛令親屬詣闕通之詔書原琁拜議郎凱反受誣人之罪琁三遷為渤海太守所在有異政以事免後尚書令張溫特表薦之徴拜尚書僕射以病乞骸骨卒於家張敦字伯仁縣人為諸暨令海寇二百餘人剽鹵為患悉平之轉重泉令民悅其化遷車騎大將軍蔣邵字景倩縣人為益陽令遷洪撫二州刺史攘虎却蝗民蒙其惠轉交州刺史傳柔字仲席縣人為宣城令無為而治謳謡載路遷鄂州刺史贊曰洪遵撰東陽志書揚扶在蔣邵張敦傅柔之後且言邵歷洪撫二州刺史轉交州敦遷車騎大將軍柔亦刺鄂州扶東漢中人也遵既如此書則邵等又在扶之前無疑矣濓不謂然漢嘗置車騎將軍衛將軍左右前後皆位次上卿典京師兵衛則車騎固漢官也敦為扶前人亦未可知若洪在兩漢時名為章郡而撫之地𨽻焉鄂亦名為江夏郡並無稱洪撫鄂三州者及隋平陳始皆置之而冠以今號則邵柔疑隋以後之人也遵曾不考之是果何耶浦陽未置縣時地屬烏傷扶自曾祖茂來遷考其所居處實今縣地故扶之墓猶在縣西北十五里扶之子孫不見有别居之文遵獨據舊經以扶𨽻浦陽以扶之子喬琁𨽻烏傷其又何耶濓皆不得不正之傅雱其先世居汴父大理評事瑄始遷浦陽之感德雱多膽略遇事奮發有為與李綱宗澤遊建炎元年金兵始退黃濳善力主和議白上遣雱為祈請使雱時階宣義郎乃特遷宣教郎以優異之未行朝論遣重臣以取信改命周望為通問使李綱為上言今日之事正當枕戈嘗膽內修外攘使刑政修而中國強則二帝不俟迎請而自歸不然雖冠蓋相望卑辭厚禮終恐無益今所遣使但當奉表兩宫致思慕之意而已上乃命綱草二帝表付雱以行獻二帝衣各一襲且致書於尼堪雱與王倫俱留軍中久之乃歸官至工部侍郎弟光字子溫為諸王宫教授未幾退歸田里方臘反縣民多托之為亂任士安統兵至怒甚欲盡屠之光適與任厚往諫之曰亂者唯通化一鄉餘皆良民將軍奉朝廷命殺賊爾奈何延及無辜耶任悟如光言光之孫如松如川皆從太史吕祖謙學知名於時黃仁環縣之上洛人以武悍為閭里雄方臘起睦州往往曹聚從賊仁環以能自歸得官受沿邊差遣建炎元年山賊何三五作亂仁環呼諸子謂曰吾受國恩恨無以為報誓當以計禽賊乃與唐子容謀偽與賊合賊信不疑仁環謂其酋曰今欲破縣兩主首俱行誰守洞汝等留此吾先破陳於是引衆鼓而東行十餘里至朱村分路口將覆賊乃詭分兩道出攻虛整部伍密令子容等各插竹葉為標識與賊兩兩相夾部分既定仁環大呼曰轉陳殺賊子容奮兵夾擊賊千餘人得脫者無數輩諸酋留者仁環令諸子享於家酒酣用斧自後斫殺之初仁環有女嫁賊黨中或曰公報國固善如愛女何仁環曰吾恐事不就一女何惜至是竟為所戮仁環官至訓武郎縣人感其德立祠祀之吳傅字清叟縣之通化人傅自少無所好唯嗜讀書中宣和三年進士第歷官至監察御史四持憲節亷明之聲甚著初州縣官遇賜燕有飲至夜分者傅奏不許見燭上從之石範字宗卿其先由青社來徙浦陽家素貴盛其大母杜氏有賢行以女歸寒士鄭剛中剛中後為名臣人服其先見範天資頴茂從吕祖謙遊講索殊精切中紹熙元年進士第調奉化尉歲飢貧民將為變範振之不誅一夫而定海寇為害範設計捕殺之改知麗水縣以丁繼母憂去遷知婺源縣縣有月樁錢二萬皆取之民民患之範建請蠲其十之二俄權通判袁州洞獠弄兵衡潭贑吉四州被禍尤酷袁當其衝人情凛凛範攝州事練軍旅閲民兵廣儲蓄博訪守禦之策威聲甚震洞獠不敢近轉通判泉州兼南外宗正丞卒年六十六範守正不撓或勸其謁權貴人美官可立至範謝曰吾儒者改官為縣亦固當爾何以僥幸為卒不詣士論多之弟籌亦能文中嘉定十三年進士第官至吉州司理子武戩戡贊曰古語有之人才必臨事乃見豈非然哉雱之使金也制詞甚褒之至有庶爾一言之合為吾兩國之成之語則當時任寄之重可見矣雱亦竒男子哉傅以亷肅自將範以振凶禦寇自效要之皆良吏若仁環者區區一劍之雄耳其初未必不鈔掠為人患亦復進之士君子之列何哉宥過録善春秋之義也録之斯進之雖然當賊氣正鋭之時使仁環不急挫其鋒則數萬生靈血汙荒原矣王萬字處一其先出於會稽唐之中世始遷烏傷之鳯林萬之祖起又自鳯林遷浦陽父約之遊淮間萬因生長濠州家甚貧而厲志於學凡三舉始中嘉定十六年進士第調和州教授遷浙西提舉司主管文字未閲月遭父喪端平元年除主管尚書户部架閣文字轉國子學録明年添差通判揚州以母老辭改鎮江萬自少忠伉有大志究心當世急務極知邊防要害嘗為書歷告重臣大官論沿邊事宜則謂長淮千里中間無大山澤為限擊首尾應正如常山蛇勢首當并兩淮惟一制閫之命是聽兩淮惟濠州居中濠之東為盱眙為楚以逹鹽城淮流深廣敵所難度濠之西為安豐為光以逹信陽淮流淺澀敵每揭厲以涉之法當調揚州北軍三千人自淮東搗虛常往來宿亳間使敵無意於東而我併力淮西淮西則又惟合肥居江淮南北之中法當建制置司合肥而以濠梁安豐光州為臂以黃岡為肘後緩急之助又必令荆襄每候西兵東來輒尾之使淮襄之勢亦合而後規模可立也論用兵則謂當以五千人為屯每屯一將二長一大將一路又合一大將而并合於制置為總統淮東可精兵三萬光黃可二萬東西夾擊而沿江制司會合肥兵共二萬以牽制其中行則結營陳止則依城壘行則賫乾糧止則就食州縣論屯田則謂當於新復州軍東則海邳所依者水之險西則唐鄧所依者山之險畫此則無地無田不耕而歸附新軍流落餘民亦有固志論守戍則謂戎司舊分地戍守殿步兵戍真揚六合鎮江兵戍揚楚盱眙建康馬司兵戍滁濠定逺都統司兵戍廬和安豐以至池司兵戍舒蘄巢縣江司兵戍蘄黃浮光地勢皆順皆以統制部之出外而皆常有帥臣居內以本軍財賦葺營棚撫士卒備器械以故軍事常整辦遇警急則帥臣親統重兵以行比乃有以建康馬帥而知黃州者都統而知光州者以池司都統而在楚州以鎮江都統而在應天者將不知兵兵不屬將往往以本軍之財資他處之用以致營柵壞而莫修士卒貧而莫給器械鈍而莫繕宜與盡還舊制其他敷陳皆類此多者或纍數千言文多不載三年授樞密院編修官嘉熙元年兼權屯田郎官萬因輪對又言於上曰天命去留原於君心陛下一一而思之凡惻然有觸於心而不安者皆心之未能同乎天者也天不在天而在陛下之心苟能天人合一永永勿替則天命在我矣其言尤為精白未幾差知台州萬至郡惟疏食弊衣終日坐公署事至立斷吏無所售多改業散去民亦化之不復訟上下肅然丁歲祲萬盡力拯之民無飢死者往往感之但言萬名莫不舉手加額曰吾父母也才五月乞祠去三年遷屯田員外郎兼編修官轉尚右郎官尋兼崇政殿説書四年擢監察御史首論刑部尚書史宅之故相之子昔嘗弄權不當復玷從班上命丞相再三諭旨迄不奉詔上不得已出宅之知平江府史嵩之自江上董師入相氣象迫遽人心傾搖衆莫敢言萬又首論之會議相之事已決疏入除大理少卿萬即日還常熟寓舍拜太常少卿辭差知寧國府辭召赴行在奏事出為福建提點刑獄加直焕章閣四川宣諭司參議官皆辭俄乞休致詔特轉朝奉郎守太常少卿致仕卒年四十八及嵩之罷相人方交論其非上思萬先見親賜御札謂萬立朝謇諤古之遺直為郡亷平古之遺愛特贈集英殿修撰豫錢五千緡田五百畝以贍給其家萬遇事敢言衆知其人豪每咨問之當金初滅鄭清之欲謀乘虛取河洛萬曰今朝廷勇於復境而怯於備邊莫若移勇於怯為自治之規不然非萬所知也已而北兵壓境三邊震動其言果驗理宗下罪已之詔命中書舍人吳泳視草萬謂泳曰用兵固失矣亦豈可遽示怯哉今邊民生意如髮宜振厲奮發以興感人心泳如其言萬初與季衍遇衍勉萬從事朱熹四書之説久之有得於時習之語謂學莫先於言顧行言是而行違非言之偽也習未熟耳熟則言行一矣故終身言行相顧發於設施論諫忠懇剴切無所顧忌初官不受人薦生平不交權貴人絲毫不妄取或饋藥材甚豐萬力却之至使人謝過萬不得已受一附子守台時有故人來謁欲售錦裀贈之入白其母母曰不可此固汝當得終官物也或以萬之介潔其母教之有素云初諡議節惠後更忠惠所著書名時習編有易書詩論語孟子中庸太極圖説及其他奏劄論天下事者凡十卷子庭字德揚受知賈似道官終大理寺丞贊曰人之欲猶夫疾也聖賢之書猶夫藥也以藥治疾則疾瘳而體順以聖賢之書克欲則欲去而理明自然之勢也世顧玩之以為辭章之助雖日誦五車亦何補身心哉萬自聞季衍讀四書之一言潛思精索反以自治故其律己則義利截然表裏不欺牧小民則忠厚粹和不事威斷人自感服居言官則不畏權姦擊之愈力言或弗行挂冠徑去嗚呼是可謂善讀者矣當時賢士交口稱譽或謂其如白圭振鷺玉尺氷壺或謂其振荒如朱熹先見如蘇洵吕獻可無實功者能之乎嗚呼是足以貽不朽矣視彼抽祕思騁妍辭而與庸人孺子同一澌盡者竟何為哉竟何為哉吳直方字行可其先毗陵人一遷於鄱再遷於睦三遷浦陽之新田唐乾寧初有名公養者又遷縣西吳溪上至直方十五世直方年七歲母亡十歲大父蕃又亡獨與其父寶居豪家利其弱時侵苦之直方雖在童子中常發憤自厲必欲伸己志乃已稍長出遊浙東西習刑法於帥府及行中書復北走京師無他親朋童御一身在逆旅中凡三十六年困苦艱難無不備歷或勸其南歸直方曰生為寄死為棄等一死耳何分冀北與江南乎其志愈壯不少折後用薦者以説書事明宗於潛邸會明宗出鎮北藩復罷去尋為上都路學正欲上又為代者所先遂主留守曼濟台家教其子托克托及額森特穆爾元統二年托克托為御史中丞以直方嘗事先朝奏為江浙等處儒學提舉中書改授副提舉未上御史臺又改授廣東亷訪司承發架閣兼照磨轉中政院架閣管勾俄升長史重紀至元末廟堂用事者專權肆虐人情震栗上與近臣謀罷其政柄更新庶務直方實協贊之上念其功召至便殿賜以黃金繫帶超授集賢直學士轉侍講學士尋又升學士時托克托為右丞相國有大政令多咨直方然後行直方每引古義告之民被其賜者甚衆未幾上章乞骸骨以大學士榮祿大夫致仕食俸賜終身至正中監察御史劾直方躐進官階奪其誥命除名為民他御史辨其誣復之直方深沉有謀人莫測其喜愠夷險一致可屬以天下大事縱群言沸騰不少動為人謙下待人恆如布衣時受一飯之恩必思報之人以是稱焉子萊志道萊别有傳趙大訥一名良勝字敬叔縣人周恭肅王元儼之十世孫也起家譯曹掾調泉州録事大盜起寧都泉之無賴男子嘯衆應之遂謀來攻城大訥作柵以禦其衝盜為引去遷興化録事轉龍溪尹俗尚鬼壘石作祠以奉紫衣神黠民將為姦利必牲犬以祭大訥投神江中移石以修孔子廟庭縣多山畬洞獠官稍侵之輒弄兵暴掠至煩大將出屯經年不解大訥調御得其術服從如良民邑大姓怙勢殺人郡守受其財出之大訥抱案詣府歷指其姦守怒陰中以他罪大訥略無所懾改永春以丁父憂去復改侯官未終喪不赴俄遷永嘉永嘉計口賦鹽民以為病大訥建請令富商轉售之瑞安猾吏偽為官書誣平民盜販民自殺者三人府下大訥訊之大訥徙之臨汀州城枕大江水暴岸善崩大訥列植巨木先以萁芒殺浪勢然後實土以石甃之岸凡數千尺得不壞除溫台等處海運千户遭母喪改知永新州州民素豪勢出守吏上聞大訥至皆畏服不敢吐氣民以死狀聞官去按之卒史千餘人從行民皆逃匿數里無煙火大訥與一二吏出田里晏然鵠湖羅陂皆群盜淵藪時出為過客患大訥用竒計剪其渠魁餘黨奔散鄉飲酒之禮久廢大訥講而行之賔主就位獻酬有節揖拜有容觀者歎恱在官二年告老解印綬而歸時至正八年夏六月也大訥性剛直不憚大吏屢典劇縣皆有能聲卒胥無敢出鄉宿猾元豪亦相告逺遁數平反寃獄民為立生祠或以事如逺鄉父老擕子弟聚觀曰此趙侯也其為人愛慕如此大訥同時有金德潤君澤者亦縣人由湖南亷訪司掾歷官至嘉興推官亦以政事稱其果毅有為議者謂不如大訥云贊曰丈夫之以功名自見者豈必藉祖父之勢哉藉祖父之勢而成者世豈無之終不足謂之丈夫必也奮自布衣卓然有立小或作州牧大或聞國政使德澤簡在人心聲聞流於後世然後始無愧於斯名善矣哉吳趙之為何其近是耶雖然均名為人均生是邦均食粟衣帛而有能有不能焉稍知自厲者可以惕然而省矣浦陽人物記卷上
