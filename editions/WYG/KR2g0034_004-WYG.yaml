front:
  text: 浦陽人物記後序浦陽人物載於鄱陽洪氏郡志者不過蔣邵張敦傅柔揚扶陳太竭何千齡六人而已邑之儒先朱氏因之以撰縣志别出新意析為四門㑹稽李知退為縣有善政𨽻遺愛傳太竭千齡錢遹梅執禮𨽻孝節傳卲敦柔扶及吳傅王萬𨽻名徳傳寳掌祖登𤣥朗靈黙𨽻髙僧傳比舊増多九人通為一十五人三山謝氏最後出獨取執禮及萬益以梅溶倪樸作浦汭先民傳金華宋景濓氏讀而非之謂洪氏紀載既甚簡略又不宜失時代後先朱氏亦不宜以㑹稽之人叅於浦陽善附之臣入於名節龎辭幻學之流儕於士類謝氏取舎謹嚴雖或差强人意亦不宜引枝蔓浮辭而於事實反多遺闕於是潜精積思稽采史傳旁求諸儒之所記録上下數百年間一善不遺先之以忠義孝友次之以政事文學貞節合二十九人區分類聚勒成一家之言號之曰人物記其文奮迅而感嘅㣲婉而精深有類歐陽文忠公五代史記之作非抱良史材者能之乎葢景濂氏自㓜以絶人之資無書不讀比其長也又得栁待制道傳黄侍講晋卿吳山長立夫三先生為之師故其撰述往往筆埶煒煌如此嗟夫浦陽之為縣不改於前而昔之人物若希闊寂寥今則昭著赫奕與通都大邑相抗者庸非景濂氏振厲之功歟向使景濂氏不亟為之更厯百餘年顯者固若無害而弗顯者不隨世而磨滅幾希矣或者則曰維桑與梓必恭敬止桑梓且然况鄉之先達乎景濂氏之作善則善矣而㣲寘品評於其間無乃不可乎曰非是之謂也文之所貴者在據事直書而是非善惡自見今景濂氏所述况又多紀善之辭吾見其扶植綱常者至矣何名為品評哉濤也不敏嘗與景濂氏師事三先生竊有同門之好頗獲窺其述作之意故敢忘鄙陋而序之末簡且以解或者之疑焉景濂氏名濂其先居京兆宋憲自唐武徳中移吳興十四傳至榮字體仁周廣順中又移義烏之根溪榮之子甫甫之子訓訓之子帳帳之子祥祥之子阜阜之子偘偘之子柏宋嘉定初又移金華之潜溪距根溪葢三里柏之子溥德溥德之子守富守富之子朝朝之子即景濂氏也國朝至正十年三月又移浦江感徳鄉之青蘿山山去孝門橋不百歩稱人之善必當本其家世故復疏此以附見云至正十年八月既望經筵檢討權㕘贊官浦江鄭濤書於京師湛露坊中
