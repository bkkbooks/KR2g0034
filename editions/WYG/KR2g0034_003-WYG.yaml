body:
  text: 浦陽人物記附録宋進士題名嘉祐四年劉煇榜于房嘉祐八年許將榜方資熙寧九年徐鐸榜錢遹元祐三年李常寧榜方揚逺崇寧五年蔡薿榜嚴裕梅執禮大觀三年賈安宅榜吳徳輿宣和三年何涣榜吳傳紹興二十一年趙逵榜朱紱隆興元年木待問榜方果黄度淳熙二年詹騤榜繆友臯紹熙元年余復榜石範紹熙四年陳亮榜朱羣嘉定元年鄭自成榜王望之嘉定七年袁甫榜石璞嘉定十三年劉渭榜石籌嘉定十六年蔣重珍榜王萬嘉熙二年周坦榜蔣厚淳祐四年留夢炎榜趙崇袍淳祐七年張淵㣲榜毛洪趙汝沓方策淳祐十年方逢辰榜樓斌武舉寳祐元年姚勉榜趙汝祥張夢弼武舉景定三年方山京榜蔣思趙崇咸淳元年阮登炳榜趙汝僊趙崇崍趙崇滼陳應酉武舉咸淳三年武學釋褐栁金咸淳六年武學釋褐陳文豹金臣王應午咸淳十年王龍澤榜趙必霡浦陽人物記附錄
  hash: sha256:d719c5ab00e5f38c88a80478f21854d93dec8798992cdfc12b157f4c9bf87fcc
